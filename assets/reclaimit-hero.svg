<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">reclaimit hero</title>
  <desc id="desc">Terminal-style banner for reclaimit, a disk cleanup CLI and TUI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="360" rx="24" fill="url(#bg)"/>
  <rect x="32" y="28" width="1216" height="304" rx="18" fill="#020617" stroke="#1e293b"/>
  <circle cx="70" cy="56" r="8" fill="#ef4444"/>
  <circle cx="96" cy="56" r="8" fill="#f59e0b"/>
  <circle cx="122" cy="56" r="8" fill="#22c55e"/>
  <text x="154" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#94a3b8">reclaimit</text>
  <text x="72" y="118" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="50" fill="url(#accent)">reclaim reclaimable disk space</text>
  <text x="72" y="158" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="26" fill="#cbd5e1">analyze • review • clean</text>
  <text x="72" y="206" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#e2e8f0">$ reclaimit analyze --root "$HOME" --format markdown</text>
  <text x="72" y="242" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#22c55e">✓ 1.8 GiB reclaimable across node_modules, .venv, dist and caches</text>
  <text x="72" y="278" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#94a3b8">Portable single binary • interactive TUI • markdown reports • safe preview before delete</text>
</svg>
