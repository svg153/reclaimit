version: '3'

tasks:
  default:
    cmds:
      - task: ci
  build:
    cmds:
      - mkdir -p bin
      - go build -ldflags "-X github.com/svg153/reclaimit.Version=dev" -o ./bin/reclaimit ./cmd/reclaimit
  install:
    cmds:
      - mkdir -p "$HOME/.local/bin"
      - go build -ldflags "-X github.com/svg153/reclaimit.Version=dev" -o "$HOME/.local/bin/reclaimit" ./cmd/reclaimit
  test:
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -func=coverage.out
  fmt:
    cmds:
      - go fmt ./...
  vet:
    cmds:
      - go vet ./...
  lint:
    desc: Run golangci-lint (downloaded on demand, pinned version)
    cmds:
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6 run ./...
  lint-fix:
    desc: Run golangci-lint with autofix
    cmds:
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6 run --fix ./...
  vulncheck:
    desc: Scan dependencies and code for known vulnerabilities (SCA)
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...
  bench:
    desc: Run benchmarks with allocation stats
    cmds:
      - go test -run '^$' -bench . -benchmem ./...
  fuzz:
    desc: Run the file-matcher fuzz target for a bounded time
    cmds:
      - go test -run '^$' -fuzz 'FuzzMatchFile' -fuzztime=30s .
  docker-build:
    desc: Build the production container image
    cmds:
      - docker build -t reclaimit:dev .
  check:
    desc: Full quality gate (format, vet, lint, vulncheck, tests, build)
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: vulncheck
      - task: coverage-check
      - task: build
  coverage-html:
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -html=coverage.out -o coverage.html
  report:
    cmds:
      - task: build
      - ./bin/reclaimit analyze --root $HOME --format markdown --out $HOME/home-disk-report.md
  tui:
    cmds:
      - task: build
      - ./bin/reclaimit tui --root $HOME --format markdown
  ci:
    cmds:
      - task: fmt
      - task: vet
      - task: test
      - task: build
  coverage-check:
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -func=coverage.out | tee coverage.txt
      - |
        total=$(grep total: coverage.txt | awk '{print $3}' | sed 's/%//')
        echo "Coverage: ${total}%"
        awk '/^total:/ {print "Total coverage: " $3}' coverage.txt
        if [ $(awk -v cov="$total" 'BEGIN {print (cov>=70)?0:1}') -ne 0 ]; then echo "Coverage ${total}% is below threshold 70%"; exit 1; fi
  dist:
    cmds:
      - echo "Building local dist via goreleaser (requires goreleaser installed locally)"
      - goreleaser release --clean --snapshot
  release:
    cmds:
      - 'echo "Releases are published by GitHub Actions when you push a v* tag."'
      - 'echo "Example: git tag v0.1.7 && git push origin v0.1.7"'
  docs:
    cmds:
      - mkdir -p docs
      - 'awk ''BEGIN{print "---\nlayout: default\n---\n"}{print}'' README.md > docs/index.md'
      - touch docs/.nojekyll
